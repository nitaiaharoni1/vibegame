<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>vigame — Tennis</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; width: 100vw; height: 100vh; }

    #hud {
      position: fixed;
      top: 0; left: 50%; transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 14px 36px 12px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0.2));
      border-radius: 0 0 16px 16px;
      font-family: 'Courier New', monospace;
      pointer-events: none;
      user-select: none;
      min-width: 280px;
    }

    #games-label {
      font-size: 11px;
      letter-spacing: 3px;
      color: #ffffff55;
      text-transform: uppercase;
    }

    #games-row {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 38px;
      font-weight: bold;
      line-height: 1;
    }

    #score1 { color: #29b6f6; text-shadow: 0 0 16px #29b6f688; }
    #score2 { color: #ef5350; text-shadow: 0 0 16px #ef535088; }
    #player1-label { font-size: 13px; color: #29b6f6aa; letter-spacing: 2px; }
    #player2-label { font-size: 13px; color: #ef5350aa; letter-spacing: 2px; }
    .g-divider { color: #ffffff33; font-size: 24px; }

    #points {
      font-size: 20px;
      color: #ffffffcc;
      letter-spacing: 2px;
      font-weight: bold;
    }

    #rally {
      font-size: 12px;
      color: #ffffff44;
      letter-spacing: 1px;
      min-height: 16px;
    }

    #message {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Courier New', monospace;
      font-size: 22px;
      font-weight: bold;
      color: #fff;
      text-align: center;
      line-height: 1.6;
      text-shadow: 0 0 20px rgba(255,255,255,0.5);
      background: rgba(0,0,0,0.72);
      padding: 16px 32px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      pointer-events: none;
      user-select: none;
    }

    #controls {
      position: fixed;
      bottom: 14px; left: 50%;
      transform: translateX(-50%);
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: #ffffff33;
      letter-spacing: 1px;
      pointer-events: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <div id="hud">
    <div id="games-label">Games</div>
    <div id="games-row">
      <span id="player1-label">P1</span>
      <span id="score1">0</span>
      <span class="g-divider">·</span>
      <span id="score2">0</span>
      <span id="player2-label">P2</span>
    </div>
    <div id="points">0 · 0</div>
    <div id="rally"></div>
  </div>

  <div id="message">Press SPACE to serve</div>

  <div id="controls">A / D &nbsp;·&nbsp; Player 1 &nbsp;&nbsp;|&nbsp;&nbsp; SPACE &nbsp;·&nbsp; Serve &nbsp;&nbsp;|&nbsp;&nbsp; R &nbsp;·&nbsp; Restart</div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
